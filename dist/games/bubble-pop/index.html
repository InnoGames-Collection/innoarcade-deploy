  <style id="shell-boot">/* Critical shell layout — inlined into game HTML <head> via Vite (see vite.config.ts). */

html,
body.game-shell {
  min-height: 100dvh;
  margin: 0;
  background: #ffffff;
  color: #14271a;
}

body.game-shell {
  --shell-accent: #4f9e16;
  --game-accent: var(--shell-accent);
}

body.game-shell.casual-shell,
body.game-shell.quiz-shell {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));
  box-sizing: border-box;
}

.game-shell-stage {
  position: relative;
  min-height: min(calc(100dvh - 20px), 560px);
  width: min(100%, 520px);
  margin: auto;
}

.fc-stage,
.fq-stage,
.mm-stage {
  position: relative;
  width: min(100%, 520px);
  min-height: min(calc(100dvh - 20px), 560px);
  margin: auto;
}

.fc-backdrop,
.fq-backdrop,
.mm-backdrop {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: #ffffff;
  z-index: 0;
}

.game-shell .game-overlay {
  position: absolute;
  inset: 0;
  z-index: 8;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(8, 14, 24, 0.52);
  backdrop-filter: blur(5px);
}

.game-shell .game-overlay.hidden {
  display: none !important;
}

.game-shell .game-panel {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 13px;
  width: min(330px, 92%);
  padding: 38px 30px 26px;
  border-radius: 18px;
  border: 1px solid #e6efdc;
  background: #ffffff;
  color: #14271a;
  box-shadow: 0 10px 30px rgba(20, 45, 14, 0.16);
}

.game-shell .btn.primary {
  border: none;
  border-radius: 999px;
  padding: 0.65rem 1.6rem;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #6cc52f 0%, #4f9e16 100%);
  cursor: pointer;
}
