<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚇</text></svg>" />
    <title>Metro Rush — GoPlay</title>
    <script type="module" crossorigin src="../../assets/metroRush-CH8UY31s.js"></script>
    <link rel="modulepreload" crossorigin href="../../assets/index-C8-u7fWW.js">
    <link rel="modulepreload" crossorigin href="../../assets/tournaments-DZKwqbUy.js">
    <link rel="modulepreload" crossorigin href="../../assets/audio-DcUQypDK.js">
    <link rel="modulepreload" crossorigin href="../../assets/gameHost-CoM1iB_N.js">
    <link rel="modulepreload" crossorigin href="../../assets/freeGameShell-D0xmmPpf.js">
    <link rel="modulepreload" crossorigin href="../../assets/loop-BDek7L7e.js">
    <link rel="modulepreload" crossorigin href="../../assets/input-DF-0NnhL.js">
    <link rel="modulepreload" crossorigin href="../../assets/storage-CInvdOsc.js">
    <link rel="stylesheet" crossorigin href="../../assets/audio-CrCdc_l1.css">
    <link rel="stylesheet" crossorigin href="../../assets/gameHost-DhAGoIcW.css">
    <link rel="stylesheet" crossorigin href="../../assets/metroRush-DbiOsY7-.css">
  </head>
  <body class="game-shell" data-game="metro-rush">
    <div id="stage" class="game-shell-stage">
      <canvas id="game" width="480" height="720"></canvas>

      <button id="closeBtn" class="gp-close gp-close-corner hidden" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>

      <div id="hud" class="hidden">
        <div class="hud-top">
          <div class="hud-stats">
            <div class="stat"><span data-i18n="td.score">Score</span><strong id="scoreVal">0</strong></div>
            <div class="stat"><span data-i18n="mr.tokens">Tokens</span><strong id="tokensVal">0</strong></div>
            <div class="stat"><span data-i18n="td.best">Best</span><strong id="bestVal">0</strong></div>
          </div>
          <div class="hud-buttons">
            <button id="muteBtn" aria-label="Sound">🔊</button>
            <button id="pauseBtn" aria-label="Pause">⏸</button>
          </div>
        </div>
      </div>

      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="shell-free-menu" id="freeMenu"></div>
          <button id="startBtn" class="btn primary" data-i18n="hub.play">Play</button>
        </div>
      </div>

      <div id="pauseOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="td.paused">Paused</h2>
          <button id="resumeBtn" class="btn primary" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="btn" data-i18n="td.restart">Play again</button>
        </div>
      </div>

      <div id="overOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="td.gameOver">Game over</h2>
          <p id="newBest" class="new-best hidden" data-i18n="td.newBest"></p>
          <div class="shell-over-final">
            <div class="shell-over-stat"><span data-i18n="td.score">Score</span><strong id="finalScore">0</strong></div>
            <div class="shell-over-stat"><span data-i18n="mr.tokens">Tokens</span><strong id="finalTokens">0</strong></div>
            <div class="shell-over-stat"><span data-i18n="td.best">Best</span><strong id="finalBest">0</strong></div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <button id="againBtn" class="btn primary" data-i18n="td.restart">Play again</button>
        </div>
      </div>
    </div>

  </body>
</html>
