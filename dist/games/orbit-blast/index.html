<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪐</text></svg>" />
    <title>Ball Shooter — GoPlay</title>
    <script type="module" crossorigin src="../../assets/orbitBlast-CV_e-606.js"></script>
    <link rel="modulepreload" crossorigin href="../../assets/index-C40yknck.js">
    <link rel="modulepreload" crossorigin href="../../assets/tournaments-DNo1mKQV.js">
    <link rel="modulepreload" crossorigin href="../../assets/audio-D9RCVG1p.js">
    <link rel="modulepreload" crossorigin href="../../assets/sessionAuth-BKWIAmuN.js">
    <link rel="modulepreload" crossorigin href="../../assets/freeGameShell-D-P3mWqQ.js">
    <link rel="modulepreload" crossorigin href="../../assets/loop-BDek7L7e.js">
    <link rel="modulepreload" crossorigin href="../../assets/fx-ccUjo7Ds.js">
    <link rel="stylesheet" crossorigin href="../../assets/audio-DmlIPLOZ.css">
    <link rel="stylesheet" crossorigin href="../../assets/sessionAuth-CdtBVGxN.css">
    <link rel="stylesheet" crossorigin href="../../assets/orbitBlast-tw4k4-KY.css">
  </head>
  <body class="game-shell" data-game="orbit-blast">
    <div id="stage" class="game-shell-stage">
      <div class="play-column">
        <header id="hud" class="hidden">
          <div class="scores">
            <div class="score-box">
              <span data-i18n="ob.score">Score</span>
              <strong id="scoreVal">0</strong>
            </div>
            <div class="score-box">
              <span data-i18n="ob.balls">Balls</span>
              <strong id="ballsVal">×1</strong>
            </div>
            <div class="score-box">
              <span data-i18n="ob.best">Best</span>
              <strong id="bestVal">0</strong>
            </div>
          </div>
          <button id="muteBtn" aria-label="Sound">🔊</button>
        </header>
        <canvas id="game" width="480" height="640"></canvas>
      </div>

      <button id="closeBtn" class="gp-close gp-close-corner hidden" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>

      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="shell-free-menu" id="freeMenu"></div>
          <button id="startBtn" class="btn primary" data-i18n="hub.play">Play</button>
        </div>
      </div>

      <div id="pauseOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button id="resumeBtn" class="btn primary hidden" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="btn hidden" data-i18n="td.restart">Play again</button>
        </div>
      </div>

      <div id="overOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="ob.gameOver">Game over</h2>
          <p id="newBest" class="new-best hidden" data-i18n="ob.newBest"></p>
          <div class="shell-over-final">
            <div class="shell-over-stat"><span data-i18n="ob.score">Score</span><strong id="finalScore">0</strong></div>
            <div class="shell-over-stat"><span data-i18n="ob.best">Best</span><strong id="finalBest">0</strong></div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <button id="againBtn" class="btn primary" data-i18n="ob.restart">Play again</button>
        </div>
      </div>
    </div>

  </body>
</html>
