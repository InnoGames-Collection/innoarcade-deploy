  <style id="shell-boot">/* Critical shell layout — inlined into game HTML <head> via Vite (see vite.config.ts). */

html,
body.game-shell {
  min-height: 100dvh;
  margin: 0;
  background: #ffffff;
  color: #14271a;
}

body.game-shell {
  --shell-accent: #4f9e16;
  --game-accent: var(--shell-accent);
}

body.game-shell.casual-shell,
body.game-shell.quiz-shell {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));
  box-sizing: border-box;
}

.game-shell-stage {
  position: relative;
  min-height: min(calc(100dvh - 20px), 560px);
  width: min(100%, 520px);
  margin: auto;
}

.fc-stage,
.fq-stage,
.mm-stage {
  position: relative;
  width: min(100%, 520px);
  min-height: min(calc(100dvh - 20px), 560px);
  margin: auto;
}

.fc-backdrop,
.fq-backdrop,
.mm-backdrop {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: #ffffff;
  z-index: 0;
}

.game-shell .game-overlay {
  position: absolute;
  inset: 0;
  z-index: 8;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(8, 14, 24, 0.52);
  backdrop-filter: blur(5px);
}

.game-shell .game-overlay.hidden {
  display: none !important;
}

.game-shell .game-panel {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 13px;
  width: min(330px, 92%);
  padding: 38px 30px 26px;
  border-radius: 18px;
  border: 1px solid #e6efdc;
  background: #ffffff;
  color: #14271a;
  box-shadow: 0 10px 30px rgba(20, 45, 14, 0.16);
}

.game-shell .btn.primary {
  border: none;
  border-radius: 999px;
  padding: 0.65rem 1.6rem;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #6cc52f 0%, #4f9e16 100%);
  cursor: pointer;
}

  <body class="game-shell arcade-shell ob-shell" data-game="orbit-blast">
    <div id="stage" class="fc-stage arcade-stage ob-stage game-shell-stage">
      <div id="fcBackdrop" class="fc-backdrop ob-backdrop" aria-hidden="true">
        <div class="ob-bg-rays"></div>
        <div class="ob-bg-orbs">
          <span></span><span></span><span></span><span></span>

        <div class="ob-bg-particles" aria-hidden="true"></div>
      </div>

      <div id="menuOverlay" class="game-overlay ob-overlay">

          <div class="ob-title-block">
            <div class="ob-title-icon">🪐</div>
            <h1 class="ob-title">Ball Shooter</h1>
            <p class="ob-tagline" data-i18n="ob.tagline">Aim and unleash a volley of orbs. Smash every numbered block before the wall reaches the bottom.</p>
          </div>
          <div class="shell-free-menu" id="freeMenu"></div>
          <div class="ob-menu-grid">
            <button class="ob-menu-chip" disabled aria-disabled="true">

              <span>Leaderboard</span>
            </button>
            <button class="ob-menu-chip" disabled aria-disabled="true">
              <span class="ob-chip-icon">⚔️</span>
              <span>Tournament</span>
            </button>
            <button class="ob-menu-chip" disabled aria-disabled="true">
              <span class="ob-chip-icon">📅</span>
              <span>Daily</span>
            </button>
            <button class="ob-menu-chip" disabled aria-disabled="true">
              <span class="ob-chip-icon">🎁</span>
              <span>Rewards</span>
            </button>
          </div>
          <button id="startBtn" class="ob-play-btn" data-i18n="hub.play">

        </div>
      </div>

      <div id="arc-play-wrapper" class="arc-play-wrapper ob-playframe hidden">

        <header id="hud" class="ob-hud">
          <div class="ob-hud-cards">

            </div>
            <div class="ob-hud-card ob-hud-best">

            </div>
            <div class="ob-hud-card">

            </div>
            <div class="ob-hud-card">
              <span class="ob-hud-label" data-i18n="ob.balls">Balls</span>

            </div>
            <div class="ob-hud-card ob-hud-combo" id="comboCard">

          <div class="ob-stats-grid">

          <div class="ob-over-actions">
            <button id="againBtn" class="ob-play-btn ob-btn-sm" data-i18n="ob.restart">Play again</button>
            <button class="ob-secondary-btn ob-btn-sm" disabled aria-disabled="true">🏆 Leaderboard</button>
            <button type="button" class="ob-secondary-btn ob-btn-sm ob-home-btn" onclick="if(history.length>1){history.back()}else{location.href='../../'}">🏠 Home</button>
          </div>
        </div>
      </div>
