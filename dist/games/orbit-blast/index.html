<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪐</text></svg>" />
    <title>Orbit Blast — InnoArcade</title>
    <script type="module" crossorigin src="../../assets/orbitBlast-DQYkwlGg.js"></script>
    <link rel="modulepreload" crossorigin href="../../assets/index-C3sw19hO.js">
    <link rel="modulepreload" crossorigin href="../../assets/audio-D-c7ZnkG.js">
    <link rel="modulepreload" crossorigin href="../../assets/profile-BEtZopPg.js">
    <link rel="modulepreload" crossorigin href="../../assets/tournaments-DfsMuneX.js">
    <link rel="modulepreload" crossorigin href="../../assets/backend-CXRXXh8R.js">
    <link rel="stylesheet" crossorigin href="../../assets/orbitBlast-YA-Nw8Vy.css">
    <link rel="stylesheet" crossorigin href="../../assets/base-HPgZI6Yo.css">
  </head>
  <body>
    <div id="stage">
      <header id="hud">
        <a class="back-link" href="../../" data-i18n="ob.back">All games</a>
        <div class="scores">
          <div class="score-box">
            <span data-i18n="ob.score">Score</span>
            <strong id="scoreVal">0</strong>
          </div>
          <div class="score-box">
            <span data-i18n="ob.balls">Balls</span>
            <strong id="ballsVal">×1</strong>
          </div>
          <div class="score-box">
            <span data-i18n="ob.best">Best</span>
            <strong id="bestVal">0</strong>
          </div>
        </div>
        <button id="muteBtn" aria-label="Sound">🔊</button>
      </header>

      <canvas id="game" width="480" height="640"></canvas>

      <p class="hint" data-i18n="ob.controls"></p>

      <div id="menuOverlay" class="overlay">
        <div class="panel">
          <div class="game-icon">🪐</div>
          <h1>Orbit Blast</h1>
          <span class="mode-badge" data-i18n="hub.tournament">Tournament</span>
          <p class="tagline" data-i18n="ob.tagline"></p>

          <div id="menuTournament" class="tournament-strip">
            <div class="ts-head">
              <span class="ts-title" id="tName">Monthly Championship</span>
              <span class="ts-ends"><span data-i18n="hub.endsIn">Ends in</span> <strong id="tEnds">—</strong></span>
            </div>
            <ol id="leaderList" class="leader-list"></ol>
          </div>

          <button id="startBtn" class="btn primary" data-i18n="hub.enterNow">Enter now</button>
          <div class="lang-switch" role="group" aria-label="Language">
            <button id="langEn" class="lang-btn">EN</button>
            <button id="langAm" class="lang-btn">አማ</button>
          </div>
          <a class="back" href="../../" data-i18n="ob.back">All games</a>
        </div>
      </div>

      <div id="overOverlay" class="overlay hidden">
        <div class="panel">
          <h2 data-i18n="ob.gameOver">Game over</h2>
          <p id="newBest" class="new-best hidden" data-i18n="ob.newBest"></p>
          <div class="final">
            <div class="score-box">
              <span data-i18n="ob.score">Score</span>
              <strong id="finalScore">0</strong>
            </div>
            <div class="score-box">
              <span data-i18n="ob.best">Best</span>
              <strong id="finalBest">0</strong>
            </div>
          </div>

          <div id="overTournament" class="tournament-strip hidden">
            <div class="rank-line">
              <span data-i18n="hub.yourRank">Your rank</span>
              <strong id="rankVal">#—</strong>
              <span id="rankTotal" class="muted-small">/ —</span>
            </div>
            <ol id="leaderList2" class="leader-list"></ol>
          </div>

          <button id="againBtn" class="btn primary" data-i18n="ob.restart">Play again</button>
          <a class="back" href="../../" data-i18n="ob.back">All games</a>
        </div>
      </div>
    </div>

  </body>
</html>
