<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Ethiorunner — GoPlay</title>
  <style id="shell-boot">/* Critical shell layout — inlined into game HTML <head> via Vite (see vite.config.ts). */

html,
body.game-shell {
  min-height: 100dvh;
  margin: 0;
  background: #ffffff;
  color: #14271a;
}

body.game-shell {
  --shell-accent: #4f9e16;
  --game-accent: var(--shell-accent);
}

body.game-shell.casual-shell,
body.game-shell.quiz-shell {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: calc(10px + env(safe-area-inset-top)) 10px calc(10px + env(safe-area-inset-bottom));
  box-sizing: border-box;
}

.game-shell-stage {
  position: relative;
  min-height: min(calc(100dvh - 20px), 560px);
  width: min(100%, 520px);
  margin: auto;
}

.fc-stage,
.fq-stage,
.mm-stage {
  position: relative;
  width: min(100%, 520px);
  min-height: min(calc(100dvh - 20px), 560px);
  margin: auto;
}

.fc-backdrop,
.fq-backdrop,
.mm-backdrop {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: #ffffff;
  z-index: 0;
}

.game-shell .game-overlay {
  position: absolute;
  inset: 0;
  z-index: 8;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  background: rgba(8, 14, 24, 0.52);
  backdrop-filter: blur(5px);
}

.game-shell .game-overlay.hidden {
  display: none !important;
}

.game-shell .game-panel {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 13px;
  width: min(330px, 92%);
  padding: 38px 30px 26px;
  border-radius: 18px;
  border: 1px solid #e6efdc;
  background: #ffffff;
  color: #14271a;
  box-shadow: 0 10px 30px rgba(20, 45, 14, 0.16);
}

.game-shell .btn.primary {
  border: none;
  border-radius: 999px;
  padding: 0.65rem 1.6rem;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, #6cc52f 0%, #4f9e16 100%);
  cursor: pointer;
}

body.game-shell[data-game="temple-dash"]{--game-accent:#e2563a;--shell-accent:#e2563a;}</style>  <script type="module" crossorigin src="../../assets/templeDash-BjxzsurU.js"></script>

  <body class="game-shell" data-game="temple-dash">
    <div id="stage" class="td-stage game-shell-stage">
      <canvas id="game"></canvas>

      <button id="closeBtn" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>

      <div id="hud">
        <div class="td-hud-row">
          <div class="td-hud-cards">
            <div class="td-card td-card--score">
              <span class="td-card-label" data-i18n="td.score">Score</span>
              <strong class="td-card-value" id="scoreVal">0</strong>
            </div>
            <div class="td-card">
              <span class="td-card-label" data-i18n="td.distance">Distance</span>
              <strong class="td-card-value" id="distVal">0m</strong>
            </div>
            <div class="td-card td-card--coins">
              <span class="td-card-label">💎 <span data-i18n="td.gems">Gems</span></span>
              <strong class="td-card-value" id="coinsVal">0</strong>
            </div>
            <div class="td-card td-card--mission">
              <span class="td-card-label" data-i18n="td.mission">Mission</span>
              <span class="td-mission-text" id="biomeVal">Highlands</span>
            </div>
          </div>
          <div class="td-hud-btns">
            <button id="settingsBtn" class="td-btn" aria-label="Settings">⚙</button>
            <button id="muteBtn" class="td-btn" aria-label="Sound">🔊</button>
            <button id="pauseBtn" class="td-btn td-btn--pause" aria-label="Pause">⏸</button>
          </div>
        </div>
        <div class="td-powerups" id="powerChips"></div>
      </div>

      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="shell-free-menu" id="freeMenu"></div>
          <button id="startBtn" class="btn primary" data-i18n="hub.play">Play</button>
        </div>
      </div>

      <div id="pauseOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="td.paused">Paused</h2>
          <button id="resumeBtn" class="btn primary" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="btn" data-i18n="td.restart">Play again</button>
        </div>
      </div>

      <div id="overOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="td.gameOver">Game over</h2>
          <p id="newBest" class="new-best hidden" data-i18n="td.newBest"></p>
          <div class="td-over-stats">
            <div class="td-over-stat td-over-stat--hero">
              <span data-i18n="td.score">Score</span>
              <strong id="finalScore">0</strong>
            </div>
            <div class="td-over-stat">
              <span data-i18n="td.distance">Distance</span>
              <strong id="finalDist">0m</strong>
            </div>
            <div class="td-over-stat">
              <span data-i18n="td.gems">Gems</span>
              <strong id="finalCoins">0</strong>
            </div>
            <div class="td-over-stat">
              <span data-i18n="td.best">Best</span>
              <strong id="finalBest">0</strong>
            </div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <div class="td-over-actions">
            <button id="againBtn" class="btn primary" data-i18n="td.restart">Play again</button>
            <a href="../../" class="btn" data-i18n="td.back">All games</a>
          </div>
        </div>
      </div>

      <div id="toast" class="toast hidden"></div>
    </div>

  </body>
</html>
