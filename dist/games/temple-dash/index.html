<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#0a0d18" />
    <link rel="manifest" href="../../manifest.webmanifest" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏃</text></svg>" />
    <title>Ethiorunner — GoPlay</title>
    <script type="module" crossorigin src="../../assets/templeDash-0hUprcd5.js"></script>
    <link rel="modulepreload" crossorigin href="../../assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="../../assets/payments-w6L6ANaZ.js">
    <link rel="modulepreload" crossorigin href="../../assets/audio-BQRHWHHN.js">
    <link rel="modulepreload" crossorigin href="../../assets/index-C19WhfG3.js">
    <link rel="modulepreload" crossorigin href="../../assets/loop-BDek7L7e.js">
    <link rel="modulepreload" crossorigin href="../../assets/input-CKS5NiBw.js">
    <link rel="modulepreload" crossorigin href="../../assets/wallet-TRPzFc0p.js">
    <link rel="modulepreload" crossorigin href="../../assets/fx-ccUjo7Ds.js">
    <link rel="stylesheet" crossorigin href="../../assets/audio-DngoG11r.css">
    <link rel="stylesheet" crossorigin href="../../assets/templeDash-Boe4IBHr.css">
  </head>
  <body>
    <div id="stage">
      <canvas id="game"></canvas>

      <div id="hud">
        <button id="closeBtn" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <div class="hud-top">
          <div class="hud-stats">
            <div class="stat"><span data-i18n="td.score">Score</span><strong id="scoreVal">0</strong></div>
            <div class="stat"><span data-i18n="td.coins">Coins</span><strong id="coinsVal">0</strong></div>
            <div class="stat biome"><span id="biomeVal">Jungle</span></div>
          </div>
          <div class="hud-buttons">
            <button id="settingsBtn" aria-label="Settings">⚙</button>
            <button id="muteBtn" aria-label="Sound">🔊</button>
            <button id="pauseBtn" aria-label="Pause">⏸</button>
          </div>
        </div>
        <div class="hud-powerups" id="powerChips"></div>
      </div>

      <div id="menuOverlay" class="overlay">
        <div class="panel">
          <h1>Ethiorunner</h1>          <p class="controls" data-i18n="td.controls"></p>

          <div class="shop">
            <h3 data-i18n="td.skins">Runners</h3>
            <div class="skin-row" id="skinRow"></div>
          </div>

          <div class="runner-tourney" id="runnerTourney"></div>

          <button id="startBtn" class="btn primary" data-i18n="hub.play">Play</button>
          <p class="hint" data-i18n="td.start"></p>
          <button type="button" class="gp-close gp-close-block" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        </div>
      </div>

      <div id="pauseOverlay" class="overlay hidden">
        <div class="panel">
          <h2 data-i18n="td.paused">Paused</h2>
          <button id="resumeBtn" class="btn primary" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="btn" data-i18n="td.restart">Play again</button>
          <button type="button" class="gp-close gp-close-block" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        </div>
      </div>

      <div id="overOverlay" class="overlay hidden">
        <div class="panel">
          <h2 data-i18n="td.gameOver">Game over</h2>
          <p id="newBest" class="new-best hidden" data-i18n="td.newBest"></p>
          <div class="final">
            <div class="stat"><span data-i18n="td.score">Score</span><strong id="finalScore">0</strong></div>
            <div class="stat"><span data-i18n="td.coins">Coins</span><strong id="finalCoins">0</strong></div>
            <div class="stat"><span data-i18n="td.best">Best</span><strong id="finalBest">0</strong></div>
          </div>
          <div class="run-reward" id="runReward"></div>
          <div class="runner-board-wrap">
            <h3 data-i18n="td.leaderboard">Leaderboard</h3>
            <div class="runner-board" id="runnerBoardOver"></div>
          </div>
          <button id="againBtn" class="btn primary" data-i18n="td.restart">Play again</button>
          <button type="button" class="gp-close gp-close-block" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        </div>
      </div>

      <div id="ftue" class="overlay hidden">
        <div class="panel ftue">
          <h2 data-i18n="td.howto">How to play</h2>
          <ul class="ftue-list">
            <li>⬅➡ <span data-i18n="td.ftueLane">Swipe or arrows to change lane</span></li>
            <li>⬆ <span data-i18n="td.ftueJump">Swipe up / ▲ to jump hurdles</span></li>
            <li>⬇ <span data-i18n="td.ftueSlide">Swipe down / ▼ to slide under beams</span></li>
            <li>🪙 <span data-i18n="td.ftueCoin">Collect coins to unlock runners</span></li>
          </ul>
          <button id="ftueBtn" class="btn primary" data-i18n="td.gotit">Got it</button>
        </div>
      </div>

      <div id="toast" class="toast hidden"></div>
    </div>

  </body>
</html>
