    <header class="topbar">
      <div class="brand">
        <span class="brand-icon">🕹️</span>

      </div>
      <nav class="topnav">
        <a href="#dashboard" class="nav-link active" data-i18n="hub.dashboard">Dashboard</a>
        <a href="#tournaments" class="nav-link" data-i18n="hub.tournaments">Tournaments</a>
        <a href="#games" class="nav-link" data-i18n="hub.freeGames">Free games</a>
        <a href="#brain" class="nav-link" data-i18n="hub.brain">Brain &amp; Word</a>
      </nav>
      <div class="lang-switch" role="group" aria-label="Language">
        <button id="langEn" class="lang-btn">EN</button>
        <button id="langAm" class="lang-btn">አማ</button>
      </div>
    </header>

    <main class="hub-main">
      <section id="dashboard" class="featured-section">
        <h2 class="section-title" data-i18n="hub.featured">Featured tournament</h2>
        <div id="featured"></div>

        <div id="playerDashboard"></div>
      </section>

      <section id="tournaments" class="tournaments-section">

      <section id="games" class="games-section">
        <h2 class="section-title" data-i18n="hub.freeGames">Free games</h2>
        <div id="gameGrid"></div>
      </section>

      <section id="brain" class="brain-section">
        <div class="cat-head">
          <h2 class="section-title">🧠 <span data-i18n="hub.brain">Brain &amp; Word</span></h2>
          <a class="view-all" href="../lexiquest/" data-i18n="hub.viewAll">View all</a>
        </div>
        <div id="brainGrid" class="cat-grid"></div>
      </section>

    <footer class="hub-footer">
