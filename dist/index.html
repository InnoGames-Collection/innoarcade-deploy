<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>" />
    <title>GoPlay — Play & Compete</title>
    <script type="module" crossorigin src="./assets/hub-i9-_1c0J.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="./assets/tournaments-Ow0S3Q7R.js">
    <link rel="modulepreload" crossorigin href="./assets/audio-C3ExYXUo.js">
    <link rel="modulepreload" crossorigin href="./assets/index-ZbX9Vwbp.js">
    <link rel="modulepreload" crossorigin href="./assets/tournamentEntry-BUzTfWts.js">
    <link rel="modulepreload" crossorigin href="./assets/currency-6Vn0SSos.js">
    <link rel="stylesheet" crossorigin href="./assets/audio-CrCdc_l1.css">
    <link rel="stylesheet" crossorigin href="./assets/hub-Bi500Fbv.css">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon">🎮</span>
        <span class="brand-name" data-i18n="app.title">GoPlay</span>
      </div>
      <nav class="topnav">
        <a href="#games" class="nav-link active" data-i18n="hub.available">Games</a>
        <a href="#topPlayers" class="nav-link" data-i18n="hub.topPlayers">Top players</a>
        <a href="#winners" class="nav-link" data-i18n="hub.winners">Winners</a>
      </nav>
      <div id="topBalances" class="top-balances"></div>
      <button id="settingsBtn" class="settings-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </header>

    <main class="hub-main">
      <section id="promo" class="promo-section" aria-label="Promotions">
        <div class="promo-track" id="promoTrack"></div>
        <div class="promo-dots" id="promoDots"></div>
      </section>

      <section id="playerBar" class="player-bar-section" aria-label="Your balances"></section>

      <section id="games" class="games-section">
        <div class="games-head">
          <h2 class="section-title">🎮 <span data-i18n="hub.available">Available games</span></h2>
          <div class="games-tools">
            <div class="seg" id="gameSeg" role="tablist">
              <button class="seg-btn active" data-filter="all" data-i18n="hub.allGames">All</button>
              <button class="seg-btn" data-filter="tournament" data-i18n="hub.tournament">Tournament</button>
              <button class="seg-btn" data-filter="free" data-i18n="arc.free">Free</button>
            </div>
            <input id="gameSearch" class="game-search" type="search" aria-label="Search games" />
          </div>
        </div>
        <div id="gameGrid"></div>
      </section>

      <section id="draws" class="draws-section phase2-hidden" hidden>
        <h2 class="section-title">🎁 <span data-i18n="hub.draws">Draws</span></h2>
        <p class="section-sub" data-i18n="hub.drawIntro">Spend points on tickets — more tickets, more chances.</p>
        <div id="drawList" class="draw-cards"></div>
      </section>

      <section id="topPlayers" class="leaderboard-section">
        <h2 class="section-title">🥇 <span data-i18n="hub.topPlayers">Top players</span></h2>
        <p class="section-sub" data-i18n="hub.topPlayersSub">Top 10 this season — ranked by best tournament RP.</p>
        <div id="seasonBanner" class="season-banner"></div>
        <div id="globalBoard" class="leaderboard-list"></div>
      </section>

      <section id="winners" class="leaderboard-section">
        <div class="winners-panel">
          <h2 class="winners-title" data-i18n="hub.winners">WINNERS</h2>
          <div id="winnersSeg" class="seg winners-seg" role="tablist">
            <button type="button" class="seg-btn active" data-cadence="daily" role="tab" data-i18n="hub.winTabDaily">Daily</button>
            <button type="button" class="seg-btn" data-cadence="weekly" role="tab" data-i18n="hub.winTabWeekly">Weekly</button>
            <button type="button" class="seg-btn" data-cadence="monthly" role="tab" data-i18n="hub.winTabMonthly">Monthly</button>
          </div>
          <div class="winners-table-wrap">
            <table class="winners-table" aria-label="Winners">
              <thead>
                <tr>
                  <th data-i18n="hub.colNo">No.</th>
                  <th data-i18n="hub.colPhone">Phone Number</th>
                  <th data-i18n="hub.colRewards">Rewards</th>
                </tr>
              </thead>
              <tbody id="winnerList"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="dashboard" class="featured-section">
        <span class="section-eyebrow" data-i18n="hub.heroEyebrow">Compete &amp; win</span>
        <h2 class="section-title" data-i18n="hub.featured">Featured tournament</h2>
        <div id="featured"></div>
      </section>

    </main>

    <footer class="hub-footer">
      <p data-i18n="hub.footer">GoPlay</p>
    </footer>

    <nav class="bottomnav" aria-label="Primary">
      <a href="#games" class="bn-item active"><span class="bn-ico">🏠</span><span data-i18n="nav.home">Home</span></a>
      <a href="#games" class="bn-item"><span class="bn-ico">🎮</span><span data-i18n="nav.games">Games</span></a>
      <a href="#topPlayers" class="bn-item"><span class="bn-ico">🥇</span><span data-i18n="nav.topPlayers">Top</span></a>
      <a href="#winners" class="bn-item"><span class="bn-ico">🏆</span><span data-i18n="nav.winners">Winners</span></a>
      <button class="bn-item" id="bnAccount"><span class="bn-ico">👤</span><span data-i18n="nav.account">Account</span></button>
    </nav>

  </body>
</html>
