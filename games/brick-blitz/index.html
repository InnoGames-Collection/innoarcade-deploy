<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧱</text></svg>" />
    <title>Brick Blitz — GoPlay</title>
  </head>
  <body class="game-shell arcade-shell bb-shell" data-game="brick-blitz">
    <div id="stage" class="fc-stage arcade-stage bb-stage game-shell-stage">
      <div id="fcBackdrop" class="fc-backdrop bb-backdrop" aria-hidden="true">
        <div class="bb-bg-rays"></div>
        <div class="bb-bg-orbs">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div id="menuOverlay" class="game-overlay bb-overlay">
        <div class="bb-menu-panel">
          <button type="button" class="gp-close gp-close-corner bb-close" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="bb-title-block">
            <div class="bb-title-icon">🧱</div>
            <h1 class="bb-title">Brick Blitz</h1>
            <p class="bb-tagline" data-i18n="bb.tagline">Smash bricks with a bouncing ball</p>
          </div>
          <div class="shell-free-menu" id="freeMenu"></div>
          <div class="bb-menu-grid">
            <button class="bb-menu-chip" disabled aria-disabled="true">
              <span class="bb-chip-icon">🏆</span>
              <span>Leaderboard</span>
            </button>
            <button class="bb-menu-chip" disabled aria-disabled="true">
              <span class="bb-chip-icon">⚔️</span>
              <span>Tournament</span>
            </button>
            <button class="bb-menu-chip" disabled aria-disabled="true">
              <span class="bb-chip-icon">📅</span>
              <span>Daily</span>
            </button>
            <button class="bb-menu-chip" disabled aria-disabled="true">
              <span class="bb-chip-icon">🎁</span>
              <span>Rewards</span>
            </button>
          </div>
          <button id="startBtn" class="bb-play-btn" data-i18n="hub.play">
            <span class="bb-play-glow"></span>
            <span class="bb-play-label">Play</span>
          </button>
        </div>
      </div>

      <div id="arc-play-wrapper" class="arc-play-wrapper bb-playframe hidden">
        <button id="closeBtn" type="button" class="gp-close gp-close-corner bb-close" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <header id="hud" class="bb-hud">
          <div class="bb-hud-cards">
            <div class="bb-hud-card bb-hud-score">
              <span class="bb-hud-label" data-i18n="td.score">Score</span>
              <strong class="bb-hud-value" id="scoreVal">0</strong>
            </div>
            <div class="bb-hud-card">
              <span class="bb-hud-label" data-i18n="shell.puzzle">Level</span>
              <strong class="bb-hud-value" id="levelVal">1</strong>
            </div>
            <div class="bb-hud-card">
              <span class="bb-hud-label" data-i18n="fs.lives">Lives</span>
              <strong class="bb-hud-value bb-lives" id="livesVal">3</strong>
            </div>
            <div class="bb-hud-card bb-hud-combo" id="comboCard">
              <span class="bb-hud-label">Combo</span>
              <strong class="bb-hud-value" id="comboVal">—</strong>
            </div>
            <div class="bb-hud-card bb-hud-best">
              <span class="bb-hud-label" data-i18n="td.best">Best</span>
              <strong class="bb-hud-value" id="bestVal">0</strong>
            </div>
          </div>
          <div class="bb-hud-actions">
            <button id="muteBtn" type="button" class="bb-action-btn" aria-label="Sound">🔊</button>
            <button id="pauseBtn" type="button" class="bb-action-btn" aria-label="Pause">⏸</button>
          </div>
        </header>
        <div class="arc-canvas-wrap bb-canvas-wrap">
          <canvas id="game" width="480" height="720"></canvas>
        </div>
      </div>

      <div id="pauseOverlay" class="game-overlay bb-overlay hidden">
        <div class="bb-panel">
          <button type="button" class="gp-close gp-close-corner bb-close" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="bb-panel-icon">⏸</div>
          <h2 class="bb-panel-title" data-i18n="td.paused">Paused</h2>
          <button id="resumeBtn" class="bb-play-btn bb-btn-sm" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="bb-secondary-btn" data-i18n="td.restart">Play again</button>
        </div>
      </div>

      <div id="levelClearOverlay" class="game-overlay bb-overlay hidden">
        <div class="bb-panel bb-panel-celebrate">
          <button type="button" class="gp-close gp-close-corner bb-close" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="bb-panel-icon bb-icon-win">✨</div>
          <h2 class="bb-panel-title" data-i18n="bb.levelClear">Level clear!</h2>
          <p id="levelScore" class="bb-level-score"></p>
          <button id="nextBtn" class="bb-play-btn bb-btn-sm" data-i18n="bb.next">Next level</button>
        </div>
      </div>

      <div id="overOverlay" class="game-overlay bb-overlay hidden">
        <div class="bb-panel bb-panel-over">
          <button type="button" class="gp-close gp-close-corner bb-close" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="bb-panel-icon">💫</div>
          <h2 class="bb-panel-title" data-i18n="td.gameOver">Game over</h2>
          <p id="newBest" class="bb-new-best hidden" data-i18n="td.newBest"></p>
          <div class="bb-final-score-ring">
            <span class="bb-final-label" data-i18n="td.score">Score</span>
            <strong class="bb-final-score" id="finalScore">0</strong>
          </div>
          <div class="bb-stats-grid">
            <div class="bb-stat-item">
              <span class="bb-stat-label">Best Combo</span>
              <strong id="statCombo" class="bb-stat-value">0</strong>
            </div>
            <div class="bb-stat-item">
              <span class="bb-stat-label">Accuracy</span>
              <strong id="statAccuracy" class="bb-stat-value">100%</strong>
            </div>
            <div class="bb-stat-item">
              <span class="bb-stat-label">Bricks</span>
              <strong id="statBricks" class="bb-stat-value">0</strong>
            </div>
            <div class="bb-stat-item">
              <span class="bb-stat-label" data-i18n="td.best">Best</span>
              <strong id="finalBest" class="bb-stat-value">0</strong>
            </div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <div class="bb-over-actions">
            <button id="againBtn" class="bb-play-btn bb-btn-sm" data-i18n="td.restart">Play again</button>
            <div class="bb-over-secondary">
              <button class="bb-secondary-btn bb-btn-compact" disabled>Leaderboard</button>
              <button class="bb-secondary-btn bb-btn-compact" disabled>Share</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/games/brick-blitz/main.ts"></script>
  </body>
</html>
