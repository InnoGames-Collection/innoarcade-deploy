<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>" />
    <title>Logic Grid — GoPlay</title>
  </head>
  <body class="game-shell quiz-shell" data-game="logic">
    <div id="stage" class="fq-stage game-shell-stage">
      <div id="fqBackdrop" class="fq-backdrop" aria-hidden="true"></div>
      <div id="fqPlayFrame" class="fq-playframe hidden">
        <button id="closeBtn" class="gp-close gp-close-corner hidden" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <div class="fq-stats">
          <div class="fq-stat">
            <span class="fq-stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg></span>
            <span class="fq-stat-label" data-i18n="eq.question">Question</span>
            <span class="fq-stat-value" id="fqStatQ">—</span>
          </div>
          <div class="fq-stat">
            <span class="fq-stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 1.5M12 5V3M5 3l2 2M19 3l-2 2"/></svg></span>
            <span class="fq-stat-label" data-i18n="eq.sessionTime">Session</span>
            <span class="fq-stat-value" id="fqStatSession">—</span>
          </div>
          <div class="fq-stat">
            <span class="fq-stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></span>
            <span class="fq-stat-label" data-i18n="eq.questionTime">This Q</span>
            <span class="fq-stat-value" id="fqStatQTime">—</span>
          </div>
          <div class="fq-stat fq-stat-score">
            <span class="fq-stat-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 4.9 5.4.8-3.9 3.8.9 5.3L12 14.8 7.2 16.8l.9-5.3L4.2 7.7l5.4-.8L12 2z"/></svg></span>
            <span class="fq-stat-label" data-i18n="td.score">Score</span>
            <span class="fq-stat-value" id="fqStatScore">0</span>
          </div>
        </div>
        <div class="fq-card" id="fq-card">
          <h2 class="fq-question" id="fq-question">…</h2>
          <div class="fq-options" id="fq-options"></div>
        </div>
        <div class="fq-hud">
          <button type="button" id="pauseBtn" class="fq-pause-btn" data-i18n="td.pause">Pause</button>
        </div>
      </div>
      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div class="shell-free-menu" id="freeMenu"></div>
          <button id="startBtn" class="btn primary" data-i18n="hub.play">Play</button>
        </div>
      </div>
      <div id="pauseOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="td.paused">Paused</h2>
          <button id="resumeBtn" class="btn primary" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="btn" data-i18n="td.restart">Play again</button>
        </div>
      </div>
      <div id="overOverlay" class="game-overlay hidden" aria-hidden="true">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <h2 data-i18n="td.gameOver">Game over</h2>
          <p id="fqOverSummary" class="fq-over-summary"></p>
          <p id="newBest" class="new-best hidden" data-i18n="td.newBest"></p>
          <div class="shell-over-final">
            <div class="shell-over-stat"><span data-i18n="td.score">Score</span><strong id="finalScore">0</strong></div>
            <div class="shell-over-stat"><span data-i18n="td.best">Best</span><strong id="finalBest">—</strong></div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <button id="againBtn" class="btn primary" data-i18n="td.restart">Play again</button>
        </div>
      </div>
    </div>
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script type="module" src="/src/games/logic/main.ts"></script>
  </body>
</html>
