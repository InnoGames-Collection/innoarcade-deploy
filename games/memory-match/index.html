<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>" />
    <title>Memory Match — GoPlay</title>
  </head>
  <body class="game-shell" data-game="memory-match">
    <div id="stage" class="mm-stage game-shell-stage">
      <div id="mmBackdrop" class="mm-backdrop" aria-hidden="true">
        <div class="mm-bg-gradient"></div>
        <div class="mm-bg-waves"></div>
        <div class="mm-bg-blob mm-bg-blob-a"></div>
        <div class="mm-bg-blob mm-bg-blob-b"></div>
        <div class="mm-bg-particles"></div>
      </div>

      <div id="menuOverlay" class="game-overlay mm-menu-overlay">
        <div class="game-panel mm-menu-panel mm-shell-card panel-clean">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <div class="shell-tourney mm-tourney-card" id="mmTourney" aria-live="polite"></div>
          <button type="button" id="mmStartBtn" class="mm-btn mm-btn-play mm-btn-compact" data-i18n="hub.play">Play</button>
        </div>
      </div>

      <div id="memory-match-wrapper" class="mm-playframe hidden">
        <button type="button" id="mmCloseBtn" class="gp-close gp-close-corner" aria-label="Close">✕</button>

        <div class="mm-hud">
          <div class="mm-stats">
            <div class="mm-stat mm-stat-time" id="mm-stat-time">
              <div class="mm-stat-head">
                <button type="button" id="mmMuteBtn" class="mm-mute-inline" aria-label="Mute">
                  <svg class="mm-ico mm-ico-sound" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M11 5L6 9H3v6h3l5 4V5zm5.5 2.5a1 1 0 011.4 0 7.5 7.5 0 010 9 1 1 0 11-1.4-1.4 5.5 5.5 0 000-6.2 1 1 0 010-1.4z"/></svg>
                  <svg class="mm-ico mm-ico-muted hidden" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M11 5L6 9H3v6h3l5 4V5zm7.5 4.5l1.4-1.4L21 9.9l-1.4 1.4L16.9 14 21 18.1l-1.4 1.4-4.1-4.1-4.1 4.1L9.9 18.1 14 14l-4.1-4.1z"/></svg>
                </button>
                <svg class="mm-ico mm-ico-time" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2a10 10 0 100 20 10 10 0 000-20zm1 11H7v-2h5V7h2v6z"/></svg>
                <span class="mm-stat-label" data-i18n="mm.time">Time</span>
              </div>
              <span class="mm-stat-value" id="mm-time">2:00</span>
            </div>
            <div class="mm-stat" id="mm-stat-moves">
              <div class="mm-stat-head">
                <svg class="mm-ico mm-ico-moves" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 7h8v2H8V7zm0 4h8v2H8v-2zm-6-1l3-3 3 3-3 3-3-3zm16 0l3-3 3 3-3 3-3-3z"/></svg>
                <span class="mm-stat-label" data-i18n="mm.moves">Moves</span>
              </div>
              <span class="mm-stat-value" id="mm-moves">0</span>
            </div>
            <div class="mm-stat" id="mm-stat-pairs">
              <div class="mm-stat-head">
                <svg class="mm-ico mm-ico-pairs" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M8 12a4 4 0 118 0 4 4 0 01-8 0zm-6 0a10 10 0 1020 0 10 10 0 00-20 0z"/></svg>
                <span class="mm-stat-label" data-i18n="mm.pairs">Pairs</span>
              </div>
              <span class="mm-stat-value" id="mm-pairs">0/6</span>
            </div>
            <div class="mm-stat mm-stat-score" id="mm-stat-score">
              <div class="mm-stat-head">
                <svg class="mm-ico mm-ico-score" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 2l2.9 6.9 7.1.6-5.4 4.6 1.7 7-6.3-3.8L5.7 21l1.7-7-5.4-4.6 7.1-.6L12 2z"/></svg>
                <span class="mm-stat-label" data-i18n="mm.score">Score</span>
              </div>
              <span class="mm-stat-value" id="mm-score">—</span>
            </div>
          </div>
          <div class="mm-timer-bar" aria-hidden="true">
            <div class="mm-timer-fill" id="mm-timer-fill"></div>
          </div>
        </div>

        <div class="mm-grid" id="mm-grid"></div>

        <div class="mm-actions">
          <button type="button" class="mm-btn mm-btn-action mm-btn-compact hidden" id="mm-pause-btn" data-i18n="td.pause">Pause</button>
          <button type="button" class="mm-btn mm-btn-action mm-btn-compact hidden" id="mm-resume-btn" data-i18n="td.resume">Resume</button>
          <button type="button" class="mm-btn mm-btn-action mm-btn-compact hidden" id="mm-restart-btn" data-i18n="td.restart">Play again</button>
        </div>
      </div>

      <div id="mmOverOverlay" class="game-overlay hidden" aria-hidden="true">
        <div class="game-panel mm-over-panel mm-shell-card">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>

          <div class="mm-over-hero">
            <span class="mm-over-hero-label" data-i18n="mm.timeUsed">Time used</span>
            <strong class="mm-over-hero-value" id="mmFinalTime">—</strong>
          </div>

          <p id="mmNewBest" class="mm-new-best hidden" data-i18n="td.newBest">New high score!</p>

          <div class="mm-over-summary" id="mmOverSummary">
            <span class="mm-over-sum-item" id="mmOverRank"><span data-i18n="td.rank">Rank</span> <strong>…</strong></span>
            <span class="mm-over-sum-item"><span data-i18n="td.best">Best</span> <strong id="mmFinalBest">—</strong></span>
            <span class="mm-over-sum-item mm-over-attempts">
              <span aria-hidden="true">🎟️</span>
              <span data-i18n="td.attemptsLeft">Attempts left</span>:
              <strong id="mmFinalAttempts">…</strong>
            </span>
          </div>

          <div class="mm-run-reward hidden" id="mmRunReward" aria-hidden="true"></div>

          <div class="mm-over-board-wrap">
            <h3 data-i18n="td.leaderboard">Leaderboard</h3>
            <div class="mm-over-board" id="mmBoardOver"></div>
          </div>

          <div class="mm-over-actions">
            <button type="button" class="mm-btn mm-btn-action mm-btn-compact" id="mmAgainBtn" data-i18n="td.restart">Play again</button>
            <button type="button" class="mm-btn mm-btn-action mm-btn-compact" id="mmHomeBtn" data-i18n="mm.home">Home</button>
          </div>
        </div>
      </div>

      <div id="toast" class="toast mm-toast hidden" role="status" aria-live="polite"></div>
    </div>

    <script type="module" src="/src/games/memory-match/main.ts"></script>
  </body>
</html>
