<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>" />
    <title>Memory Match — GoPlay</title>
  </head>
  <body>
    <div id="stage">
      <header class="topbar">
        <span class="game-name" data-i18n="mm.title">Memory Match</span>
        <div class="topbar-actions">
          <div class="lang-switch" role="group" aria-label="Language">
            <button id="langEn" class="lang-btn" type="button">EN</button>
            <button id="langAm" class="lang-btn" type="button">አማ</button>
          </div>
          <button type="button" class="gp-close" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        </div>
      </header>

      <div id="memory-match-wrapper">
        <div class="game-tourney" id="mmTourney" aria-live="polite"></div>
        <div class="mm-stats">
          <div class="mm-stat"><span class="mm-stat-label" data-i18n="mm.time">Time</span><span class="mm-stat-value" id="mm-time">2:00</span></div>
          <div class="mm-stat"><span class="mm-stat-label" data-i18n="mm.moves">Moves</span><span class="mm-stat-value" id="mm-moves">0</span></div>
          <div class="mm-stat"><span class="mm-stat-label" data-i18n="mm.pairs">Pairs</span><span class="mm-stat-value" id="mm-pairs">0/6</span></div>
          <div class="mm-stat mm-stat-score"><span class="mm-stat-label" data-i18n="mm.score">Score</span><span class="mm-stat-value" id="mm-score">0</span></div>
        </div>
        <div class="mm-grid" id="mm-grid"></div>
        <div class="mm-actions">
          <button type="button" class="mm-action-btn mm-peek" id="mm-play-btn" data-i18n="mm.play">Play</button>
          <button type="button" class="mm-action-btn mm-pause-btn hidden" id="mm-pause-btn" aria-label="Pause">⏸</button>
          <button type="button" class="mm-action-btn mm-peek hidden" id="mm-resume-btn" data-i18n="td.resume">Resume</button>
          <button type="button" class="mm-action-btn hidden" id="mm-restart-btn" data-i18n="mm.restart">Restart</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/games/memory-match/main.ts"></script>
  </body>
</html>
