<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>" />
    <title>Memory Match — GoPlay</title>
  </head>
  <body>
    <div id="stage">
      <header class="topbar">
        <button type="button" class="gp-close" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <span class="game-name" data-i18n="mm.title">Memory Match</span>
        <div class="lang-switch" role="group" aria-label="Language">
          <button id="langEn" class="lang-btn">EN</button>
          <button id="langAm" class="lang-btn">አማ</button>
        </div>
      </header>

      <div id="memory-match-wrapper">
        <div class="mm-hud">
          <div class="mm-hud-item"><span>🪙</span><div><div class="mm-hud-sub" data-i18n="mm.cost">Cost</div><div class="mm-hud-val" id="mm-hud-cost">…</div></div></div>
          <div class="mm-hud-title">🧩 <span data-i18n="mm.title">Memory</span></div>
          <div class="mm-hud-item r"><div style="text-align:right"><div class="mm-hud-sub" data-i18n="mm.win">Win</div><div class="mm-hud-val gold" id="mm-hud-win">…</div></div><span>⭐</span></div>
        </div>
        <div class="mm-stats">
          <div class="mm-stat"><span class="mm-stat-label" data-i18n="mm.moves">Moves:</span><span class="mm-stat-value" id="mm-moves">0</span></div>
          <div class="mm-stat"><span class="mm-stat-label" data-i18n="mm.pairs">Pairs:</span><span class="mm-stat-value" id="mm-pairs">0/6</span></div>
        </div>
        <div class="mm-grid" id="mm-grid"></div>
        <div class="mm-message" id="mm-message"></div>
        <div class="mm-actions">
          <button class="mm-restart-btn mm-peek" id="mm-peek-btn">PEEK (1)</button>
          <button class="mm-restart-btn" id="mm-restart-btn" data-i18n="mm.restart">RESTART</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/games/memory-match/main.ts"></script>
  </body>
</html>
