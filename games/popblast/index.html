<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍬</text></svg>" />
    <title>Candy Blast — GoPlay</title>
  </head>
  <body class="game-shell casual-shell brain-shell" data-game="popblast">
    <div id="stage" class="fc-stage game-shell-stage">
      <!-- Premium animated background -->
      <div class="pb-bg-layer" aria-hidden="true">
        <div class="pb-bg-rays"></div>
        <div class="pb-bg-sparkles" id="pbSparkles"></div>
        <div class="pb-bg-bubbles" id="pbBubbles"></div>
      </div>

      <div id="fcBackdrop" class="fc-backdrop" aria-hidden="true"></div>

      <div id="fcPlayFrame" class="fc-playframe hidden">
        <button id="closeBtn" class="gp-close gp-close-corner hidden" aria-label="Close">✕</button>
        <div id="popblast-game-wrapper">
          <div class="pb-board-wrap">
            <div class="pb-board-frame">
              <div class="board" id="board"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Start screen -->
      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean pb-menu-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <span class="pb-menu-icon" aria-hidden="true">🍬</span>
          <h1 class="pb-menu-title" data-i18n="pb.title">Candy Blast</h1>
          <div class="shell-free-menu" id="freeMenu"></div>
          <nav class="pb-menu-nav" aria-label="Game navigation">
            <a class="pb-menu-nav-btn" href="../../#featuredTournaments">🏆 Tournament</a>
            <a class="pb-menu-nav-btn" href="../../#topPlayers">📊 Leaderboard</a>
            <a class="pb-menu-nav-btn" href="../../">🎯 Daily Challenge</a>
            <a class="pb-menu-nav-btn" href="../../">🎁 Rewards</a>
          </nav>
          <button id="startBtn" class="btn primary pb-btn-primary" data-i18n="hub.play">Play</button>
        </div>
      </div>

      <!-- Game over / Victory screen -->
      <div id="overOverlay" class="game-overlay hidden" aria-hidden="true">
        <div class="game-panel pb-over-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
          <div id="pbOverTrophy" class="pb-over-trophy hidden" aria-hidden="true">🏆</div>
          <h2 id="fcOverTitle" class="pb-over-title" data-i18n="td.gameOver">Game over</h2>
          <p id="fcOverSummary" class="fc-over-summary hidden"></p>
          <p id="newBest" class="new-best hidden" data-i18n="td.newBest"></p>
          <div class="pb-stars" id="pbStars" aria-label="Stars earned">
            <span class="pb-star" data-star="1">⭐</span>
            <span class="pb-star" data-star="2">⭐</span>
            <span class="pb-star" data-star="3">⭐</span>
          </div>
          <div class="pb-over-stats">
            <div class="pb-over-stat pb-over-stat--highlight">
              <span data-i18n="td.score">Score</span>
              <strong id="finalScore">0</strong>
            </div>
            <div class="pb-over-stat">
              <span data-i18n="td.best">Best</span>
              <strong id="finalBest">—</strong>
            </div>
            <div class="pb-over-stat">
              <span>Combo</span>
              <strong id="pbFinalCombo">0</strong>
            </div>
            <div class="pb-over-stat">
              <span>Cleared</span>
              <strong id="pbFinalCleared">0</strong>
            </div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <div class="pb-over-actions">
            <button id="againBtn" class="btn primary pb-btn-primary" data-i18n="td.restart">Play again</button>
            <a class="pb-btn-secondary" href="../../#topPlayers" data-i18n="hub.leaderboard">Leaderboard</a>
            <button type="button" class="pb-btn-secondary" id="pbHomeBtn">Home</button>
          </div>
        </div>
      </div>
    </div>

    <div class="combo" id="combo" data-i18n="pb.combo">COMBO!</div>
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script type="module" src="/src/games/popblast/main.ts"></script>
  </body>
</html>
