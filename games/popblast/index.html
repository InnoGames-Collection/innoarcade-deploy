<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍬</text></svg>" />
    <title>Candy Blast — GoPlay</title>
  </head>
  <body class="game-shell" data-game="popblast">
    <div id="stage">
      <header class="topbar">
        <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <span class="game-name" data-i18n="pb.title">Pop Blast</span>
      </header>

      <div id="popblast-game-wrapper">
        <div id="freeHud"></div>

        <div class="popblast-game-container">
          <div class="popblast-top">
            <div class="popblast-card">
              <h3>⭐ <span data-i18n="pb.score">SCORE</span></h3>
              <span id="score">0</span>
            </div>
            <div class="popblast-card">
              <h3>🎯 <span data-i18n="pb.moves">MOVES</span></h3>
              <span id="moves">20</span>
            </div>
          </div>

          <div class="board" id="board"></div>

          <div class="popblast-bottom">
            <button class="popblast-btn" id="popblast-restart" data-i18n="pb.restart">🔄 Restart</button>
            <div class="message" data-i18n="pb.swap">Swap gems with your finger</div>
          </div>
        </div>

        <div class="shell-run-reward" id="runReward"></div>
        <div class="combo" id="combo" data-i18n="pb.combo">COMBO!</div>
      </div>
    </div>

    <script type="module" src="/src/games/popblast/main.ts"></script>
  </body>
</html>
