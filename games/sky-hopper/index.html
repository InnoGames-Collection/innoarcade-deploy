<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☁️</text></svg>" />
    <title>Sky Hopper — GoPlay</title>
  </head>
  <body>
    <div id="stage">
      <canvas id="game" width="480" height="720"></canvas>

      <div id="hud">
        <button id="muteBtn" aria-label="Sound">🔊</button>
        <button id="pauseBtn" aria-label="Pause">⏸</button>
      </div>

      <div id="menuOverlay" class="overlay">
        <div class="panel">
          <h1>Sky Hopper</h1>
          <p class="subtitle" data-i18n="game.skyHopper.desc"></p>
          <p class="controls" data-i18n="sh.controls"></p>
          <button id="startBtn" class="btn primary" data-i18n="hub.play">Play</button>
          <div class="lang-switch" role="group" aria-label="Language">
            <button id="langEn" class="lang-btn">EN</button>
            <button id="langAm" class="lang-btn">አማ</button>
          </div>
          <a class="back" href="../../" data-i18n="td.back">All games</a>
        </div>
      </div>

      <div id="pauseOverlay" class="overlay hidden">
        <div class="panel">
          <h2 data-i18n="td.paused">Paused</h2>
          <button id="resumeBtn" class="btn primary" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="btn" data-i18n="td.restart">Play again</button>
          <a class="back" href="../../" data-i18n="td.back">All games</a>
        </div>
      </div>

      <div id="overOverlay" class="overlay hidden">
        <div class="panel">
          <h2 data-i18n="td.gameOver">Game over</h2>
          <p id="finalScore" class="score"></p>
          <p id="newBest" class="new-best hidden" data-i18n="td.newBest"></p>
          <button id="againBtn" class="btn primary" data-i18n="td.restart">Play again</button>
          <a class="back" href="../../" data-i18n="td.back">All games</a>
        </div>
      </div>
    </div>

    <script type="module" src="/src/games/sky-hopper/main.ts"></script>
  </body>
</html>
