<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧩</text></svg>" />
    <title>Slide Puzzle — GoPlay</title>
  </head>
  <body class="game-shell casual-shell brain-shell" data-game="slide-puzzle">
    <div id="stage" class="fc-stage game-shell-stage">
      <div id="fcBackdrop" class="fc-backdrop" aria-hidden="true">
        <div class="sp-bg-layer">
          <div class="sp-bg-orb sp-bg-orb--1"></div>
          <div class="sp-bg-orb sp-bg-orb--2"></div>
          <div class="sp-bg-orb sp-bg-orb--3"></div>
          <div class="sp-bg-shape sp-bg-shape--1"></div>
          <div class="sp-bg-shape sp-bg-shape--2"></div>
          <div class="sp-bg-shape sp-bg-shape--3"></div>
        </div>
      </div>
      <div id="fcPlayFrame" class="fc-playframe hidden">
        <button id="closeBtn" class="gp-close gp-close-corner hidden" aria-label="Close">✕</button>
        <div class="sp-hud-row" id="spHudRow">
          <button type="button" id="spSettingsHudBtn" class="sp-settings-btn" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          </button>
        </div>
        <div id="lq-mount"></div>
      </div>
      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean sp-menu-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <div class="sp-menu-hero">
            <div class="sp-menu-icon" aria-hidden="true">🧩</div>
            <div class="sp-menu-head">
              <div class="sp-menu-title">15 Puzzle</div>
              <div class="sp-menu-sub">Classic numbered sliding challenge</div>
            </div>
          </div>
          <div class="shell-free-menu" id="freeMenu"></div>
          <button type="button" id="spPlayBtn" class="sp-play-cta" data-i18n="hub.play">Play</button>
          <div class="sp-mode-grid">
            <button type="button" class="sp-mode-card sp-mode-card--tournament sp-mode-card--locked" disabled>
              <span class="sp-mode-card__icon" aria-hidden="true">🏆</span>
              <span class="sp-mode-card__label">Tournament</span>
              <span class="sp-mode-card__desc">Compete nationwide</span>
              <span class="sp-mode-card__badge">Soon</span>
            </button>
            <button type="button" class="sp-mode-card sp-mode-card--daily" id="spDailyBtn">
              <span class="sp-mode-card__icon" aria-hidden="true">📅</span>
              <span class="sp-mode-card__label">Daily Challenge</span>
              <span class="sp-mode-card__desc">Fresh puzzles every day</span>
            </button>
          </div>
          <div class="sp-menu-actions">
            <button type="button" class="sp-menu-action" id="spLeaderMenuBtn">
              <span aria-hidden="true">📊</span>
              <span>Leaderboard</span>
            </button>
            <button type="button" class="sp-menu-action" id="spHowToBtn">
              <span aria-hidden="true">❓</span>
              <span>How to Play</span>
            </button>
            <button type="button" class="sp-menu-action" id="spSettingsBtn">
              <span aria-hidden="true">⚙️</span>
              <span>Settings</span>
            </button>
          </div>
          <button id="startBtn" class="visually-hidden" data-i18n="hub.play">Play</button>
        </div>
      </div>
      <div id="overOverlay" class="game-overlay hidden" aria-hidden="true">
        <div class="game-panel sp-over-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <div class="sp-over-hero">
            <div class="sp-over-trophy" aria-hidden="true">🏆</div>
          </div>
          <h2 data-i18n="td.gameOver">Game over</h2>
          <p id="fcOverSummary" class="fc-over-summary"></p>
          <p id="newBest" class="new-best hidden" data-i18n="td.newBest"></p>
          <div class="sp-over-grid">
            <div class="sp-over-stat sp-over-stat--score">
              <span data-i18n="td.score">Score</span>
              <strong id="finalScore">0</strong>
            </div>
            <div class="sp-over-stat">
              <span>Moves</span>
              <strong id="spOverMoves">—</strong>
            </div>
            <div class="sp-over-stat">
              <span>Time</span>
              <strong id="spOverTime">—</strong>
            </div>
            <div class="sp-over-stat sp-over-stat--rating">
              <span>Efficiency</span>
              <strong id="spOverRating">—</strong>
            </div>
            <div class="sp-over-stat">
              <span data-i18n="td.best">Best Score</span>
              <strong id="finalBest">—</strong>
            </div>
            <div class="sp-over-stat">
              <span>Tournament Rank</span>
              <strong id="spOverRank">—</strong>
            </div>
          </div>
          <div class="shell-over-final hidden" aria-hidden="true">
            <div class="shell-over-stat"><span data-i18n="td.score">Score</span><strong>0</strong></div>
            <div class="shell-over-stat"><span data-i18n="td.best">Best</span><strong>—</strong></div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <button id="againBtn" class="btn primary" data-i18n="td.restart">Play again</button>
          <button type="button" id="spLeaderBtn" class="btn">Leaderboard</button>
          <button type="button" id="spHomeBtn" class="btn">Home</button>
        </div>
      </div>
    </div>
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script type="module" src="/src/games/slide-puzzle/main.ts"></script>
  </body>
</html>
