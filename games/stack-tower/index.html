<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗼</text></svg>" />
    <title>Stack Tower — GoPlay</title>
  </head>
  <body class="game-shell arcade-shell" data-game="stack-tower">
    <div id="stage" class="fc-stage arcade-stage game-shell-stage">
      <div id="fcBackdrop" class="fc-backdrop" aria-hidden="true"></div>
      <div id="menuOverlay" class="game-overlay">
        <div class="game-panel panel-clean">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <div class="shell-free-menu" id="freeMenu"></div>
          <button id="startBtn" class="btn primary" data-i18n="hub.play">Play</button>
        </div>
      </div>
      <div id="arc-play-wrapper" class="arc-play-wrapper hidden">
        <button id="closeBtn" type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
        <header id="hud" class="arc-hud">
          <div class="fp-stats">
            <div class="fp-stat fp-stat-score">
              <span class="fp-stat-label" data-i18n="st.height">Height</span>
              <strong class="fp-stat-value" id="scoreVal">0</strong>
            </div>
          </div>
          <div class="arc-hud-actions">
            <button id="muteBtn" type="button" aria-label="Sound">🔊</button>
            <button id="pauseBtn" type="button" aria-label="Pause">⏸</button>
          </div>
        </header>
        <div class="arc-canvas-wrap">
          <canvas id="game" width="480" height="720"></canvas>
        </div>
      </div>
      <div id="pauseOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <h2 data-i18n="td.paused">Paused</h2>
          <button id="resumeBtn" class="btn primary" data-i18n="td.resume">Resume</button>
          <button id="restartBtn" class="btn" data-i18n="td.restart">Play again</button>
        </div>
      </div>
      <div id="overOverlay" class="game-overlay hidden">
        <div class="game-panel">
          <button type="button" class="gp-close gp-close-corner" aria-label="Close">✕</button>
          <h2 data-i18n="td.gameOver">Game over</h2>
          <p id="newBest" class="new-best hidden" data-i18n="td.newBest"></p>
          <div class="shell-over-final">
            <div class="shell-over-stat"><span data-i18n="st.height">Height</span><strong id="finalScore">0</strong></div>
            <div class="shell-over-stat"><span data-i18n="td.best">Best</span><strong id="finalBest">0</strong></div>
          </div>
          <div class="shell-run-reward" id="runReward"></div>
          <button id="againBtn" class="btn primary" data-i18n="td.restart">Play again</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/games/stack-tower/main.ts"></script>
  </body>
</html>
