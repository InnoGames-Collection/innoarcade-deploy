<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👆</text></svg>" />
    <title>Tap Game — GoPlay</title>
  </head>
  <body>
    <div id="stage">
      <header class="topbar">
        <button type="button" class="gp-close gp-close-corner" aria-label="Close" onclick="if(history.length>1){history.back()}else{location.href='../../'}">✕</button>
        <span class="game-name" data-i18n="tg.title">Tap Game</span>
        <div class="lang-switch" role="group" aria-label="Language">
          <button id="langEn" class="lang-btn">EN</button>
          <button id="langAm" class="lang-btn">አማ</button>
        </div>
      </header>

      <div id="tap-game-wrapper">
        <div class="tg-hud">
          <div class="tg-hud-item"><span>🪙</span><div><div class="tg-hud-sub" data-i18n="arc.cost">Cost</div><div class="tg-hud-val" id="tg-hud-cost">…</div></div></div>
          <div class="tg-hud-title">👆 <span data-i18n="tg.title">Tap Game</span></div>
          <div class="tg-hud-item r"><div style="text-align:right"><div class="tg-hud-sub" data-i18n="arc.win">Win</div><div class="tg-hud-val gold" id="tg-hud-win">…</div></div><span>⭐</span></div>
        </div>
        <div class="tg-stats">
          <div class="tg-stat"><span class="tg-stat-label" data-i18n="tg.score">Score:</span><span class="tg-stat-value" id="tg-score">0</span></div>
          <div class="tg-stat"><span class="tg-stat-label" data-i18n="tg.time">Time:</span><span class="tg-stat-value" id="tg-time">10</span></div>
        </div>
        <div class="tg-area" id="tg-area">
          <div class="tg-hint" id="tg-hint" data-i18n="tg.hint">Tap START then hit the circles!</div>
        </div>
        <div class="tg-message" id="tg-message"></div>
        <button class="tg-start-btn" id="tg-start-btn" data-i18n="arc.start">START</button>
      </div>
    </div>

    <script type="module" src="/src/games/tap-game/main.ts"></script>
  </body>
</html>
